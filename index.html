<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Xe Điện Nội Bộ - Cảng Phước An</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --neon-gold: #ffcc00;
            --staff-green: #39ff14; 
            --guest-red: #ff3131;   
            --white: #ffffff;
            --container-width: 530px;
            --neon-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: var(--container-width); height: 100vh;
            position: relative; background-color: var(--bg-dark);
            color: var(--white);
        }

        /* TRANG CHỦ */
        #step-home {
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/tanamedi4-cloud/dichuyennoibo/refs/heads/main/BIENBAOE.png');
            background-size: cover; background-position: center; position: absolute; top: 0; left: 0; z-index: 100;
        }

        .logo-section {
            position: absolute; top: 0; left: 0; width: 100%; height: 171px;
            display: flex; justify-content: center; align-items: center;
        }

        .logo-section img { width: 90%; height: auto; filter: drop-shadow(var(--neon-shadow)); }

        .interaction-section {
            position: absolute; top: 240px; left: 0; width: 100%; height: auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn-custom {
            border: 2px solid var(--neon-gold); background-color: rgba(0, 0, 0, 0.7);
            color: var(--neon-gold); padding: 12px 0; border-radius: 12px;
            font-weight: bold; width: 85%; margin: 8px 0; text-align: center;
            cursor: pointer; text-transform: uppercase; font-size: 16px;
            box-shadow: var(--neon-shadow); transition: 0.2s;
            text-decoration: none; display: inline-block; backdrop-filter: blur(5px);
        }
        .btn-custom:active { transform: scale(0.96); background-color: var(--neon-gold); color: #000; }

        .call-btn {
            background-color: var(--staff-green); color: black; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; text-decoration: none;
            display: inline-block; margin-top: 10px; box-shadow: 0 0 15px var(--staff-green);
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 5px var(--staff-green); }
            50% { box-shadow: 0 0 20px var(--staff-green); }
            100% { box-shadow: 0 0 5px var(--staff-green); }
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid var(--neon-gold);
            border-radius: 50%; width: 35px; height: 35px;
            animation: spin 1s linear infinite; margin: 0 auto 8px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .marquee-box { width: 100%; overflow: hidden; margin-top: 30px; background: rgba(0,0,0,0.5); padding: 5px 0;}
        .scrolling-text {
            color: var(--guest-red); font-weight: bold; white-space: nowrap; display: inline-block; font-size: 26px;
            animation: marquee 20s linear infinite; text-shadow: 0 0 10px var(--guest-red);
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* ĐỊNH VỊ TOGGLE */
        .geo-setting {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            font-size: 10px; color: #aaa; cursor: pointer; z-index: 1000;
        }

        /* MÀN HÌNH LỚP PHỦ */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        #password-modal { background: rgba(0,0,0,0.9); z-index: 300; }

        input {
            width: 80%; padding: 12px; margin: 10px 0;
            border: 1px solid #333; border-radius: 8px; font-size: 16px;
            background: #1a1a1a; color: white; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-gold); box-shadow: 0 0 10px rgba(255,204,0,0.2); }

        /* BẢN ĐỒ */
        .map-view {
            width: 100%; height: 100%;
            background-image: url('https://raw.githubusercontent.com/tanamedi4-cloud/dichuyennoibo/d283a84ebadc0d910c3c09f209a5cb3c61f97e35/GOC.png');
            background-size: 100% 100%; position: relative; z-index: 50;
        }

        .dot {
            width: 28px; height: 28px; border-radius: 50%; position: absolute; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: bold;
            transform: translate(-50%, -50%); border: 2px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.8); transition: all 0.3s ease;
        }
        
        .dot-blue { background: rgba(0, 102, 255, 0.7); border-color: #00ccff; }
        .dot-red { background: var(--guest-red); animation: pulse-red 1s infinite; z-index: 10; box-shadow: 0 0 15px var(--guest-red); }
        .dot-green { background: var(--staff-green); animation: pulse-green-dot 1s infinite; z-index: 10; color: black; box-shadow: 0 0 15px var(--staff-green); }

        @keyframes pulse-red { 
            0% { transform: translate(-50%, -50%) scale(1); } 
            50% { transform: translate(-50%, -50%) scale(1.2); } 
            100% { transform: translate(-50%, -50%) scale(1); } 
        }
        @keyframes pulse-green-dot { 
            0% { transform: translate(-50%, -50%) scale(1); } 
            50% { transform: translate(-50%, -50%) scale(1.2); } 
            100% { transform: translate(-50%, -50%) scale(1); } 
        }

        .hidden { display: none !important; }

        /* KHUNG THÔNG BÁO */
        #status-box {
            position: absolute; left: 24%; top: 0.6%; width: 75.5%; height: 16.7%; 
            background: rgba(0, 0, 0, 0.85); padding: 8px; border-radius: 8px; 
            border: 1px solid var(--neon-gold); text-align: center; z-index: 500; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box; font-size: 14px; overflow: hidden; backdrop-filter: blur(5px);
        }

        .booking-list-container {
            overflow-y: auto; height: 100%; width: 100%; text-align: left;
            margin-top: 5px; border-top: 1px solid #333; padding-right: 5px;
        }
        
        .booking-item {
            border-bottom: 1px dashed #333; padding: 6px 0; width: 100%; font-size: 13px; color: #ddd;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="step-home">
        <div class="logo-section">
            <img src="https://raw.githubusercontent.com/tanamedi4-cloud/MAPPORTT/refs/heads/main/logopa.gif" alt="Logo">
        </div>
        <div class="interaction-section">
            <div class="btn-custom" onclick="selectRole('Khách hàng/Đối tác')">Khách hàng, đối tác</div>
            <div class="btn-custom" onclick="selectRole('Nhân viên')">Nhân viên nội bộ</div>
            <div class="btn-custom" onclick="openDriverLogin()" style="border-color: #555; color: #aaa;">Tài xế xe điện</div>
            
            <div class="marquee-box">
                <div class="scrolling-text">Vui lòng bật định vị để đặt xe ...</div>
            </div>
        </div>
        <div class="geo-setting" id="geo-text" onclick="toggleGeo()">Định vị: TẮT</div>
    </div>

    <div id="step-info" class="overlay-screen hidden">
        <h2 style="color: var(--neon-gold); text-shadow: var(--neon-shadow);">THÔNG TIN ĐẶT XE</h2>
        <input type="text" id="user-name" placeholder="Họ và tên">
        <input type="tel" id="user-phone" placeholder="Số điện thoại (10 chữ số)">
        <div class="btn-custom" onclick="showMap()">Vào Sơ Đồ Chọn Điểm Đón</div>
        <p onclick="location.reload()" style="color:var(--guest-red); cursor:pointer;">Quay lại</p>
    </div>

    <div id="password-modal" class="overlay-screen hidden">
        <div style="background: #1a1a1a; padding: 25px; border-radius: 15px; width: 75%; text-align: center; border: 1px solid var(--neon-gold);">
            <h3 style="color: var(--neon-gold)">XÁC MINH TÀI XẾ</h3>
            <input type="password" id="pass-input" placeholder="Nhập mật khẩu nội bộ" style="text-align:center;">
            <div class="btn-custom" style="width:100%" onclick="checkDriverPass()">Xác nhận</div>
            <p onclick="location.reload()" style="color:gray; cursor:pointer;">Hủy</p>
        </div>
    </div>

    <div id="step-driver-info" class="overlay-screen hidden">
        <h2 style="color: var(--neon-gold)">THÔNG TIN TÀI XẾ</h2>
        <input type="text" id="driver-name" placeholder="Họ và tên tài xế">
        <input type="tel" id="driver-phone" placeholder="Số điện thoại (10 chữ số)">
        <input type="number" id="driver-car-id" placeholder="Số xe điện (VD: 01, 02)">
        <div class="btn-custom" onclick="accessDriverMap()">Bắt đầu làm việc</div>
        <p onclick="location.reload()" style="color:var(--guest-red); cursor:pointer;">Thoát</p>
        <div class="geo-setting" style="position:relative; margin-top:20px;" onclick="toggleGeo()">Bật/Tắt định vị (Yêu cầu mật khẩu)</div>
    </div>

    <div id="step-map" class="map-view hidden">
        <div id="status-box" class="hidden">
            <div id="msg-text" style="width: 100%; color: white;">Đang xử lý...</div>
            <div id="passenger-info" class="hidden" style="width:100%; height:100%; display:flex; flex-direction:column;"></div>
        </div>
        <div id="driver-status-bar" class="hidden" style="position:absolute; bottom:0; background:rgba(0,0,0,0.9); color:var(--neon-gold); width:100%; padding:15px; text-align:center; z-index: 600; font-weight:bold; letter-spacing:1px; border-top: 1px solid var(--neon-gold);">
            TÀI XẾ: <span id="active-driver-info" style="color: white;"></span>
        </div>
    </div>

</div>

<script>
    // --- TỰ ĐỘNG ĐIỀN THÔNG TIN TỪ LOCAL STORAGE ---
    window.onload = function() {
        if(localStorage.getItem('pa_userName')) document.getElementById('user-name').value = localStorage.getItem('pa_userName');
        if(localStorage.getItem('pa_userPhone')) document.getElementById('user-phone').value = localStorage.getItem('pa_userPhone');
        
        if(localStorage.getItem('pa_driverName')) document.getElementById('driver-name').value = localStorage.getItem('pa_driverName');
        if(localStorage.getItem('pa_driverPhone')) document.getElementById('driver-phone').value = localStorage.getItem('pa_driverPhone');
        if(localStorage.getItem('pa_driverCar')) document.getElementById('driver-car-id').value = localStorage.getItem('pa_driverCar');
    };

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJbg7o0FsAIpVKXApyv7ZkMTZC1_dhAAw2RLmA6fFTxRtTmyFiM3XKp2Wu4tTm3yZT_A/exec";
    // Link Webhook MS Teams bạn vừa cung cấp
    const TEAMS_WEBHOOK_URL = "https://phuocanportoutlook.webhook.office.com/webhookb2/54b27b73-cbe4-49ac-8bc3-982261a6cb0e@16c3e05f-b10b-4321-b598-50ef052ac59e/IncomingWebhook/a12f7c9759544a28b23d3dea0fc5a257/71fea885-704c-4b38-ab86-04810e7f8403/V2FyUFUXdzuNVoh16ksLiM-HynjOy34D2ryeg_VhTSsX41";
    
    const CORRECT_PASS = "1a@";
    const GEO_PASS = "123abc@";
    const PORT_COORDS = { lat: 10.598, lon: 106.969 }; // Tọa độ Cảng Phước An

    const firebaseConfig = {
        apiKey: "AIzaSyC9q9UxlipawTBYVPNR-8uZXJDqyLZuMQM",
        authDomain: "dichuyennoibo.firebaseapp.com",
        projectId: "dichuyennoibo",
        databaseURL: "https://dichuyennoibo-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userData = { role: '', name: '', phone: '' };
    let isDriverMode = false;
    let myBookingId = null; 
    let geoEnabled = false;
    window.currentBookings = [];

    // --- KIỂM TRA HỌ TÊN CÓ NGHĨA ---
    function isValidName(name) {
        name = name.trim();
        const nameRegex = /^[\p{L}\s]+$/u;
        if (!nameRegex.test(name)) return false;
        
        const words = name.split(/\s+/);
        if (words.length < 2) return false;
        
        for (let word of words) {
            if (word.length < 2) return false;
        }

        const identicalCharsRegex = /^(.)\1+$/;
        for (let word of words) {
            if (identicalCharsRegex.test(word)) return false;
        }

        return true;
    }

    const phoneRegex = /^\d{10}$/; 
    const carIdRegex = /^\d{1,2}$/; 

    // --- TÍNH NĂNG ĐỊNH VỊ ---
    function toggleGeo() {
        const pass = prompt("Nhập mật khẩu để thay đổi chế độ định vị:");
        if (pass === GEO_PASS) {
            geoEnabled = !geoEnabled;
            alert("Đã " + (geoEnabled ? "BẬT" : "TẮT") + " chế độ giới hạn định vị 2km.");
            document.getElementById('geo-text').innerText = "Định vị: " + (geoEnabled ? "BẬT" : "TẮT");
        } else {
            alert("Mật khẩu không đúng!");
        }
    }

    function checkLocationPermission(callback) {
        if (!geoEnabled) return callback(true);
        if (!navigator.geolocation) {
            alert("Thiết bị không hỗ trợ định vị!");
            return callback(false);
        }
        navigator.geolocation.getCurrentPosition((pos) => {
            const R = 6371;
            const dLat = (pos.coords.latitude - PORT_COORDS.lat) * Math.PI / 180;
            const dLon = (pos.coords.longitude - PORT_COORDS.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(PORT_COORDS.lat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            
            if (dist <= 2) callback(true);
            else {
                alert("Bạn đang ở ngoài phạm vi Cảng (>2km). Không thể sử dụng ứng dụng.");
                callback(false);
            }
        }, () => {
            alert("Vui lòng bật GPS!");
            callback(false);
        });
    }

    // --- XỬ LÝ DỮ LIỆU ---
    db.ref('bookings').on('value', (snapshot) => {
        let activeBookings = [];
        snapshot.forEach((childSnapshot) => {
            activeBookings.push(childSnapshot.val());
        });
        window.currentBookings = activeBookings;
        initMap(isDriverMode);
    });

    setInterval(() => {
        if(!isDriverMode && myBookingId) {
            let myBooking = window.currentBookings.find(b => b.id === myBookingId);
            if(myBooking && myBooking.status === 'ACCEPTED') {
                updateStatusBox(false, window.currentBookings);
            }
        }
    }, 5000);

    function initMap(isDriver) {
        const map = document.getElementById('step-map');
        map.querySelectorAll('.dot').forEach(d => d.remove());

        let displayBookings = [];
        if (!isDriver) {
            displayBookings = window.currentBookings.filter(b => b.id === myBookingId);
        } else {
            displayBookings = window.currentBookings.filter(b => 
                b.status === 'PENDING' || (b.status === 'ACCEPTED' && b.driverPhone === window.driverSession.phone)
            );
        }

        updateStatusBox(isDriver, displayBookings);

        points.forEach(p => {
            let bookingsAtPoint = displayBookings.filter(b => b.point == p.id);
            if (!isDriver && bookingsAtPoint.length === 0) {
                renderDot(p, 'dot-blue', p.id, false);
            } else if (bookingsAtPoint.length > 0) {
                let b = bookingsAtPoint[0];
                let dotClass = b.role === 'Khách hàng/Đối tác' ? 'dot-red' : 'dot-green';
                renderDot(p, dotClass, p.id, isDriver);
            }
        });
    }

    function renderDot(p, className, label, isDriver) {
        const d = document.createElement('div');
        d.className = `dot ${className}`;
        d.style.left = (p.x / 1400 * 100) + '%';
        d.style.top = (p.y / 2850 * 100) + '%';
        d.innerText = label;
        d.onclick = () => isDriver ? handleDriverClick(p.id) : submitBooking(p.id);
        document.getElementById('step-map').appendChild(d);
    }

    function updateStatusBox(isDriver, displayBookings) {
        const statusBox = document.getElementById('status-box');
        const msgText = document.getElementById('msg-text');
        const pInfo = document.getElementById('passenger-info');

        if (isDriver) {
            msgText.classList.add('hidden');
            if (displayBookings.length > 0) {
                statusBox.classList.remove('hidden'); 
                pInfo.classList.remove('hidden'); 
                pInfo.style.display = 'flex';
                
                let html = `<div style="color:var(--neon-gold); font-weight:bold; font-size:14px; margin-bottom: 5px;">DANH SÁCH LỆNH CỦA TÀI XẾ</div><div class="booking-list-container">`;
                
                displayBookings.forEach(b => {
                    let statusLabel = b.status === 'PENDING' 
                        ? '<span style="color:var(--guest-red); font-weight:bold;">Đang chờ</span>' 
                        : '<span style="color:var(--staff-green); font-weight:bold;">Đã nhận</span>';
                        
                    html += `<div class="booking-item">Điểm <b>${b.point}</b>: ${b.name} (${statusLabel})</div>`;
                });
                
                pInfo.innerHTML = html + `</div>`;
            } else { 
                statusBox.classList.add('hidden'); 
            }
        } else if (myBookingId) {
            let myBooking = displayBookings.find(b => b.id === myBookingId);
            statusBox.classList.remove('hidden');
            if (!myBooking) {
                msgText.innerHTML = "<b style='color:var(--staff-green)'>Hoàn tất! Hẹn gặp lại.</b>";
                setTimeout(() => location.reload(), 2000);
            } else if (myBooking.status === 'ACCEPTED') {
                const waitTime = (Date.now() - myBooking.acceptedAt) / 60000;
                let html = `<span style='color:var(--staff-green); font-weight:bold;'>Tài xế đang đến (Xe ${myBooking.driverCar})</span><br>TX: ${myBooking.driverName}`;
                
                if (waitTime >= 10) {
                    html += `<br><a href="tel:${myBooking.driverPhone}" class="call-btn">GỌI TÀI XẾ</a>`;
                }
                
                msgText.innerHTML = html;
                
            } else {
                msgText.innerHTML = `<div class="loader"></div>Đang chờ tài xế...<br><div class="btn-custom" style="width: 100px; padding: 5px; margin-top:8px; font-size: 12px; border-color:var(--guest-red); color:var(--guest-red); background: transparent;" onclick="location.reload()">Hủy</div>`;
            }
        }
    }

    function submitBooking(pointId) {
        checkLocationPermission((allowed) => {
            if (!allowed) return;
            if(myBookingId) return;
            if(!confirm("Đón bạn tại Điểm " + pointId + "?")) return;
            const id = Date.now().toString();
            myBookingId = id;

            // 1. Gửi lên Firebase
            db.ref('bookings/' + id).set({
                id: id, point: pointId, name: userData.name, phone: userData.phone,
                role: userData.role, status: 'PENDING', acceptedAt: null,
                driverName: '', driverCar: '', driverPhone: ''
            }).catch(err => {
                alert("Lỗi kết nối. Vui lòng kiểm tra lại mạng!");
                console.error(err);
            });

            // 2. Gửi lên Google Sheets
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(userData.name)}&phone=${encodeURIComponent(userData.phone)}&role=${encodeURIComponent(userData.role)}&point=${pointId}`;
            fetch(finalUrl, { mode: 'no-cors' }).catch(() => {});

            // 3. GỬI THÔNG BÁO WEBHOOK VỀ MS TEAMS
            const teamsPayload = {
                "@type": "MessageCard",
                "@context": "http://schema.org/extensions",
                "themeColor": "ffcc00",
                "summary": "Yêu cầu đặt xe mới từ Cảng Phước An",
                "sections": [{
                    "activityTitle": "🚕 CÓ YÊU CẦU ĐẶT XE ĐIỆN MỚI",
                    "facts": [
                        { "name": "📍 Điểm đón:", "value": `**Điểm số ${pointId}**` },
                        { "name": "👤 Người đặt:", "value": userData.name },
                        { "name": "📞 Số điện thoại:", "value": userData.phone },
                        { "name": "🏷️ Phân loại:", "value": userData.role }
                    ],
                    "markdown": true
                }]
            };

            fetch(TEAMS_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(teamsPayload)
            }).catch(err => console.log("Lỗi gửi Webhook Teams: ", err));

        });
    }

    function handleDriverClick(pointId) {
        let b = window.currentBookings.find(x => x.point == pointId && (x.status === 'PENDING' || x.driverPhone === window.driverSession.phone));
        if (!b) return;
        if (b.status === 'PENDING') {
            if (confirm("Nhận đón khách tại điểm " + pointId + "?")) {
                db.ref('bookings/' + b.id).update({
                    status: 'ACCEPTED', driverName: window.driverSession.name,
                    driverCar: window.driverSession.car, driverPhone: window.driverSession.phone,
                    acceptedAt: Date.now()
                });
            }
        } else {
            if (confirm("Xác nhận đã đón khách thành công?")) db.ref('bookings/' + b.id).remove();
        }
    }

    function selectRole(r) { 
        userData.role = r; 
        document.getElementById('step-home').classList.add('hidden'); 
        document.getElementById('step-info').classList.remove('hidden'); 
    }
    
    function showMap() { 
        let n = document.getElementById('user-name').value.trim();
        let p = document.getElementById('user-phone').value.trim();
        
        if (!n || !p) return alert("Vui lòng nhập đủ họ tên và số điện thoại!");
        if (!isValidName(n)) return alert("Họ và tên không hợp lệ! Vui lòng nhập đầy đủ Họ và Tên có nghĩa (ít nhất 2 từ).");
        if (!phoneRegex.test(p)) return alert("Số điện thoại không hợp lệ! Bắt buộc phải nhập đúng 10 số tự nhiên, không chứa chữ cái hay khoảng trắng.");

        userData.name = n; 
        userData.phone = p; 

        localStorage.setItem('pa_userName', n);
        localStorage.setItem('pa_userPhone', p);

        document.getElementById('step-info').classList.add('hidden'); 
        document.getElementById('step-map').classList.remove('hidden'); 
        initMap(false); 
    }
    
    function openDriverLogin() { 
        document.getElementById('step-home').classList.add('hidden'); 
        document.getElementById('password-modal').classList.remove('hidden'); 
    }
    
    function checkDriverPass() { 
        if (document.getElementById('pass-input').value === CORRECT_PASS) { 
            document.getElementById('password-modal').classList.add('hidden'); 
            document.getElementById('step-driver-info').classList.remove('hidden'); 
        } else alert("Sai mật khẩu!"); 
    }
    
    function accessDriverMap() { 
        let n = document.getElementById('driver-name').value.trim();
        let p = document.getElementById('driver-phone').value.trim();
        let c = document.getElementById('driver-car-id').value.trim();
        
        if (!n || !p || !c) return alert("Vui lòng nhập đầy đủ thông tin tài xế!");
        if (!isValidName(n)) return alert("Tên tài xế không hợp lệ! Vui lòng nhập đầy đủ Họ và Tên có nghĩa (ít nhất 2 từ).");
        if (!phoneRegex.test(p)) return alert("Số điện thoại tài xế không hợp lệ! Bắt buộc nhập đúng 10 số.");
        if (!carIdRegex.test(c)) return alert("Số xe điện không hợp lệ! Bắt buộc nhập 1 hoặc 2 chữ số (VD: 01, 02), tuyệt đối không điền chữ.");

        window.driverSession = { name: n, phone: p, car: c }; 

        localStorage.setItem('pa_driverName', n);
        localStorage.setItem('pa_driverPhone', p);
        localStorage.setItem('pa_driverCar', c);

        isDriverMode = true; 
        document.getElementById('step-driver-info').classList.add('hidden'); 
        document.getElementById('step-map').classList.remove('hidden'); 
        document.getElementById('driver-status-bar').classList.remove('hidden'); 
        document.getElementById('active-driver-info').innerText = n + " - Xe " + c; 
        initMap(true); 
    }
